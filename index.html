<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cilok Art Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="top-line"></div>

        <main class="content">
            <div class="hero-section">
                <h1 class="text-portfolio">PORTFOLIO</h1>
                
                <div class="image-wrapper">
                    <img src="home.jpg" alt="Art Piece">
                </div>

                <div class="brand-name">
                    <h2 class="cilok">CILOK</h2>
                    <h2 class="art">ART</h2>
                </div>

                <div class="footer-info">
                    <p>@cilokart</p>
                    <p>cilokart.com</p>
                </div>
            </div>

            <aside class="sidebar">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 100 100" fill="#8A2BE2">
                        <path d="M50 0C60 25 100 40 100 50C100 60 60 75 50 100C40 75 0 60 0 50C0 40 40 25 50 0Z"/>
                    </svg>
                </div>
                
                <div class="present-box">
                    <span>Present</span>
                    <h3>HomePage</h3>
                </div>

                <div class="description">
                    <p>A captivating and representative image from Murad's work.</p>
                    <p class="highlight">Capturing the Essence of Life</p>
                </div>
            </aside>
        </main>
    </div>

</body>
</html>
